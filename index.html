<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>童軍集會點名</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-gray-100">
  <!-- 頂部工具列 -->
  <div id="app-toolbar" class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-30">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 py-2 flex flex-wrap items-center justify-between gap-2">
      <div class="text-sm text-gray-600">
        <i class="fa-brands fa-github mr-1"></i>
        <span id="toolbar-repo"></span>
      </div>
      <div class="flex items-center gap-2">
        <span id="sync-status" class="text-xs text-gray-500"></span>
        <button id="token-btn" type="button"

          title="設定 GitHub Token 以啟用儲存功能">
          <i class="fa-solid fa-key mr-1"></i>設定 Token
        </button>
        <button id="export-btn" type="button"
          class="rounded-lg border border-gray-300 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 transition">
          <i class="fa-solid fa-file-excel mr-1 text-green-600"></i>匯出 Excel

        <button id="refresh-btn" type="button"
          class="rounded-lg border border-gray-300 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 transition">
          <i class="fa-solid fa-arrows-rotate mr-1"></i>重新載入
        </button>
      </div>
    </div>
  </div>

  <!-- 主版：五個支部 -->
  <div id="home-view" class="min-h-screen flex items-center justify-center p-4 sm:p-8">
    <main class="w-full max-w-4xl">
      <header class="text-center mb-8 sm:mb-10">
        <h1 class="text-2xl sm:text-4xl font-bold text-gray-800">
          <i class="fa-solid fa-campground text-green-600 mr-2"></i>童軍集會點名
        </h1>
        <p class="text-sm sm:text-base text-gray-500 mt-2">
          <i class="fa-solid fa-hand-pointer mr-1"></i>請選擇功能或支部
        </p>
      </header>
      <div id="section-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5"></div>
      <div id="home-extra-grid" class="mt-4 sm:mt-5"></div>
    </main>
  </div>

  <!-- 支部詳情：Excel 式出席表 -->
  <div id="detail-view" class="hidden min-h-screen p-4 sm:p-6 lg:p-8">
    <div class="max-w-[1400px] mx-auto">
      <div class="bg-white rounded-2xl shadow-lg p-4 sm:p-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
          <div class="flex items-center gap-3">
            <button id="back-btn" type="button"
              class="rounded-lg border border-gray-300 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
              <i class="fa-solid fa-arrow-left mr-1"></i>返回主版

            <div>
              <h2 id="section-title" class="text-xl sm:text-2xl font-bold text-gray-800"></h2>
              <p class="text-sm text-gray-500">
                <i class="fa-solid fa-clipboard-check mr-1"></i>出席登記表
              </p>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
          <div class="rounded-xl border border-gray-200 p-4 bg-gray-50">
            <p class="text-sm font-medium text-gray-700 mb-2">
              <i class="fa-solid fa-user-plus text-blue-600 mr-1"></i>新增成員（只需登記一次）
            </p>
            <div class="flex gap-2">
              <input type="text" id="new-member-input" placeholder="輸入姓名"

              <button id="add-member-btn" type="button"
                class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 transition">
                <i class="fa-solid fa-plus mr-1"></i>新增
              </button>
            </div>
          </div>
          <div class="rounded-xl border border-gray-200 p-4 bg-gray-50">
            <p class="text-sm font-medium text-gray-700 mb-2">
              <i class="fa-solid fa-calendar-plus text-blue-600 mr-1"></i>新增集會日期
            </p>
            <div class="flex gap-2">
              <input type="date" id="new-date-input"
                class="flex-1 rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none" />
              <button id="add-date-btn" type="button"
                class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 transition">
                <i class="fa-solid fa-plus mr-1"></i>新增
              </button>
            </div>
          </div>
        </div>

        <p id="detail-error" class="mb-4 text-sm text-red-600 hidden" role="alert">
          <i class="fa-solid fa-circle-exclamation mr-1"></i><span id="detail-error-text"></span>
        </p>

        <div class="rounded-xl border border-gray-300 overflow-hidden">
          <div class="overflow-x-auto">
            <table id="attendance-table" class="w-full min-w-max text-sm border-collapse">
              <thead id="table-head"></thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
          <div id="empty-state" class="hidden py-16 text-center text-gray-400">
            <i class="fa-solid fa-table-cells text-4xl mb-3 block"></i>
            <p class="text-base">尚未有成員或集會日期</p>
            <p class="text-sm mt-1">請先新增成員姓名及集會日期</p>
          </div>
        </div>

        <div class="mt-6 flex flex-col sm:flex-row sm:items-center gap-3">
          <button id="calc-save-btn" type="button"
            class="rounded-lg bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 active:bg-blue-800 transition-colors">
            <i class="fa-solid fa-calculator mr-1"></i>計算出席率並儲存
          </button>
          <p id="calc-success" class="text-sm text-green-600 hidden">
            <i class="fa-solid fa-circle-check mr-1"></i><span id="calc-success-text"></span>
          </p>
        </div>

        <p class="mt-3 text-xs text-gray-500">
          <i class="fa-solid fa-circle-info mr-1"></i>提示：資料儲存於 GitHub，其他電腦請按「重新載入」取得最新資料。點擊格子依序切換：缺席 → 出席 → 未加入。
        </p>

        <section class="mt-8 border-t border-gray-200 pt-6">
          <h3 class="text-base font-bold text-gray-800 mb-3">
            <i class="fa-solid fa-clock-rotate-left text-blue-600 mr-1"></i>計算紀錄 History
          </h3>
          <div id="history-empty" class="text-sm text-gray-400 py-4">
            <i class="fa-solid fa-inbox mr-1"></i>尚無計算紀錄
          </div>
          <div id="history-list" class="space-y-3 max-h-80 overflow-y-auto"></div>
        </section>
      </div>
    </div>
  </div>

  <!-- 申請款項 -->
  <div id="payment-view" class="hidden min-h-screen p-4 sm:p-6 lg:p-8">
    <div class="max-w-2xl mx-auto">
      <div class="bg-white rounded-2xl shadow-lg p-4 sm:p-6">
        <div class="flex items-center gap-3 mb-6">
          <button id="payment-back-btn" type="button"
            class="rounded-lg border border-gray-300 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
            <i class="fa-solid fa-arrow-left mr-1"></i>返回主版
          </button>
          <div>
            <h2 class="text-xl sm:text-2xl font-bold text-gray-800">
              <i class="fa-solid fa-file-invoice-dollar mr-2 text-emerald-600"></i>申請款項
            </h2>
            <p class="text-sm text-gray-500">填寫以下資料並上傳收據截圖</p>
          </div>
        </div>

        <form id="payment-form" class="space-y-4">
          <div>
            <label for="payment-applicant" class="block text-sm font-medium text-gray-700 mb-1">
              <i class="fa-solid fa-user mr-1 text-blue-600"></i>申請人姓名
            </label>
            <input type="text" id="payment-applicant" required placeholder="請輸入姓名"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none" />
          </div>

          <div>
            <label for="payment-section" class="block text-sm font-medium text-gray-700 mb-1">
              <i class="fa-solid fa-layer-group mr-1 text-blue-600"></i>支部
            </label>
            <select id="payment-section" required
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none bg-white">
              <option value="">請選擇支部</option>
            </select>
          </div>

          <div>
            <label for="payment-purpose" class="block text-sm font-medium text-gray-700 mb-1">
              <i class="fa-solid fa-pen-to-square mr-1 text-blue-600"></i>款項用途
            </label>
            <input type="text" id="payment-purpose" required placeholder="例如：購買活動物資"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none" />
          </div>

          <div>
            <label for="payment-amount" class="block text-sm font-medium text-gray-700 mb-1">
              <i class="fa-solid fa-dollar-sign mr-1 text-blue-600"></i>金額（HKD）
            </label>
            <input type="number" id="payment-amount" required min="0.01" step="0.01" placeholder="0.00"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none" />
          </div>

          <div>
            <label for="payment-receipt" class="block text-sm font-medium text-gray-700 mb-1">
              <i class="fa-solid fa-receipt mr-1 text-blue-600"></i>收據截圖
            </label>
            <input type="file" id="payment-receipt" required accept="image/*"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm file:mr-3 file:rounded-md file:border-0 file:bg-blue-50 file:px-3 file:py-1.5 file:text-sm file:font-medium file:text-blue-700 hover:file:bg-blue-100" />
            <div id="payment-receipt-preview" class="mt-3 hidden">
              <img id="payment-receipt-img" alt="收據預覽" class="max-h-48 rounded-lg border border-gray-200" />
            </div>
          </div>

          <p id="payment-error" class="text-sm text-red-600 hidden" role="alert">
            <i class="fa-solid fa-circle-exclamation mr-1"></i><span id="payment-error-text"></span>
          </p>
          <p id="payment-success" class="text-sm text-green-600 hidden">
            <i class="fa-solid fa-circle-check mr-1"></i><span id="payment-success-text"></span>
          </p>

          <button type="submit" id="payment-submit-btn"
            class="w-full rounded-lg bg-emerald-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700 transition">
            <i class="fa-solid fa-paper-plane mr-1"></i>提交申請
          </button>
        </form>

        <section class="mt-8 border-t border-gray-200 pt-6">
          <h3 class="text-base font-bold text-gray-800 mb-3">
            <i class="fa-solid fa-list mr-1 text-emerald-600"></i>申請紀錄
          </h3>
          <div id="payment-list-empty" class="text-sm text-gray-400 py-4">
            <i class="fa-solid fa-inbox mr-1"></i>尚無申請紀錄
          </div>
          <div id="payment-list" class="space-y-3 max-h-96 overflow-y-auto"></div>
        </section>
      </div>
    </div>
  </div>

  <script>
    // 部署時請修改此設定（公開儲存庫，所有人無需登入即可共用資料）
    const GITHUB_CONFIG = {
      owner: "windass117",
      repo: "scout-attendance",
      branch: "main",
      path: "data/attendance.json",
      defaultToken: "",
    };

    const TOKEN_STORAGE_KEY = "scout-github-token";

    const SECTIONS = [
      { id: "grasshopper", name: "小童軍", icon: "fa-seedling", color: "bg-green-500" },
      { id: "cub", name: "幼童軍", icon: "fa-child-reaching", color: "bg-yellow-500" },
      { id: "scout", name: "童軍", icon: "fa-person-hiking", color: "bg-blue-500" },
      { id: "venture", name: "深資童軍", icon: "fa-mountain", color: "bg-purple-500" },
      { id: "rover", name: "樂行童軍", icon: "fa-compass", color: "bg-orange-500" },
    ];

    const PAYMENT_SECTIONS = SECTIONS.concat([
      { id: "troop", name: "旅部", icon: "fa-flag", color: "bg-gray-600" },
    ]);

    let currentSectionId = null;
    let isPaymentView = false;
    let githubSha = null;
    let isSyncing = false;
    let cache = { attendance: {}, history: [], paymentRequests: [] };
    let pendingReceiptDataUrl = null;

    const toolbarRepo = document.getElementById("toolbar-repo");
    const syncStatus = document.getElementById("sync-status");
    const tokenBtn = document.getElementById("token-btn");
    const exportBtn = document.getElementById("export-btn");
    const refreshBtn = document.getElementById("refresh-btn");
    const homeView = document.getElementById("home-view");
    const detailView = document.getElementById("detail-view");
    const sectionGrid = document.getElementById("section-grid");
    const homeExtraGrid = document.getElementById("home-extra-grid");
    const paymentView = document.getElementById("payment-view");
    const sectionTitle = document.getElementById("section-title");
    const backBtn = document.getElementById("back-btn");
    const newMemberInput = document.getElementById("new-member-input");
    const addMemberBtn = document.getElementById("add-member-btn");
    const newDateInput = document.getElementById("new-date-input");
    const addDateBtn = document.getElementById("add-date-btn");
    const detailError = document.getElementById("detail-error");
    const detailErrorText = document.getElementById("detail-error-text");
    const tableHead = document.getElementById("table-head");
    const tableBody = document.getElementById("table-body");
    const emptyState = document.getElementById("empty-state");
    const attendanceTable = document.getElementById("attendance-table");
    const calcSaveBtn = document.getElementById("calc-save-btn");
    const calcSuccess = document.getElementById("calc-success");
    const calcSuccessText = document.getElementById("calc-success-text");
    const historyEmpty = document.getElementById("history-empty");
    const historyList = document.getElementById("history-list");
    const paymentBackBtn = document.getElementById("payment-back-btn");
    const paymentForm = document.getElementById("payment-form");
    const paymentApplicant = document.getElementById("payment-applicant");
    const paymentSection = document.getElementById("payment-section");
    const paymentPurpose = document.getElementById("payment-purpose");
    const paymentAmount = document.getElementById("payment-amount");
    const paymentReceipt = document.getElementById("payment-receipt");
    const paymentReceiptPreview = document.getElementById("payment-receipt-preview");
    const paymentReceiptImg = document.getElementById("payment-receipt-img");
    const paymentError = document.getElementById("payment-error");
    const paymentErrorText = document.getElementById("payment-error-text");
    const paymentSuccess = document.getElementById("payment-success");
    const paymentSuccessText = document.getElementById("payment-success-text");
    const paymentSubmitBtn = document.getElementById("payment-submit-btn");
    const paymentListEmpty = document.getElementById("payment-list-empty");
    const paymentList = document.getElementById("payment-list");

    function getActiveToken() {
      if (GITHUB_CONFIG.defaultToken) return GITHUB_CONFIG.defaultToken;
      return localStorage.getItem(TOKEN_STORAGE_KEY) || "";
    }

    async function validateAndClearBadToken() {
      if (GITHUB_CONFIG.defaultToken) {
        localStorage.removeItem(TOKEN_STORAGE_KEY);
        return;
      }
      const lsToken = localStorage.getItem(TOKEN_STORAGE_KEY);
      if (!lsToken) return;
      const res = await fetch(
        getContentsApiUrl() + "?ref=" + encodeURIComponent(GITHUB_CONFIG.branch),
        { headers: githubHeaders() }
      );
      if (res.status === 401) localStorage.removeItem(TOKEN_STORAGE_KEY);
    }

    function publicGithubHeaders() {
      return {
        Accept: "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28",
      };
    }

    function githubHeaders() {
      const headers = publicGithubHeaders();
      const token = getActiveToken();
      if (token) headers.Authorization = "Bearer " + token;
      return headers;
    }

    function getRawUrl() {
      return "https://raw.githubusercontent.com/" + GITHUB_CONFIG.owner + "/" +
        GITHUB_CONFIG.repo + "/" + GITHUB_CONFIG.branch + "/" + GITHUB_CONFIG.path;
    }

    function getContentsApiUrl() {
      return "https://api.github.com/repos/" + GITHUB_CONFIG.owner + "/" +
        GITHUB_CONFIG.repo + "/contents/" +
        encodeURIComponent(GITHUB_CONFIG.path).replace(/%2F/g, "/");
    }

    function setSyncStatus(text, type) {
      syncStatus.textContent = text;
      syncStatus.className = "text-xs " + (type === "error" ? "text-red-600" : type === "success" ? "text-green-600" : "text-gray-500");
    }

    function syncStatusSummary() {
      const n = loadHistory().length;
      return n > 0 ? "（歷史紀錄 " + n + " 筆）" : "";
    }

    function showError(message) {
      detailErrorText.textContent = message;
      detailError.classList.remove("hidden");
    }

    function hideError() {
      detailErrorText.textContent = "";
      detailError.classList.add("hidden");
    }

    function decodeBase64Utf8(base64) {
      const binary = atob(base64.replace(/\n/g, ""));
      const bytes = Uint8Array.from(binary, function (c) { return c.charCodeAt(0); });
      return new TextDecoder().decode(bytes);
    }

    function encodeBase64Utf8(str) {
      const bytes = new TextEncoder().encode(str);
      let binary = "";
      bytes.forEach(function (b) { binary += String.fromCharCode(b); });
      return btoa(binary);
    }

    function applyParsedData(parsed) {
      cache = {
        attendance: parsed.attendance || {},
        history: Array.isArray(parsed.history) ? parsed.history : [],
        paymentRequests: Array.isArray(parsed.paymentRequests) ? parsed.paymentRequests : [],
      };
      return cache;
    }

    async function fetchFromGitHub() {
      const apiUrl = getContentsApiUrl() + "?ref=" + encodeURIComponent(GITHUB_CONFIG.branch);
      let res = await fetch(apiUrl, { headers: publicGithubHeaders(), cache: "no-store" });

      if (res.ok) {
        const file = await res.json();
        githubSha = file.sha;
        return applyParsedData(JSON.parse(decodeBase64Utf8(file.content)));
      }

      if (res.status === 404) {
        cache = { attendance: {}, history: [], paymentRequests: [] };
        githubSha = null;
        return cache;
      }

      res = await fetch(getRawUrl() + "?t=" + Date.now(), { cache: "no-store" });
      if (res.status === 404) {
        cache = { attendance: {}, history: [], paymentRequests: [] };
        githubSha = null;
        return cache;
      }
      if (!res.ok) throw new Error("無法讀取 GitHub 資料（" + res.status + "）");
      applyParsedData(await res.json());
      await refreshSha();
      return cache;
    }

    async function testToken(token) {
      const res = await fetch(
        getContentsApiUrl() + "?ref=" + encodeURIComponent(GITHUB_CONFIG.branch),
        {
          headers: {
            Authorization: "Bearer " + token,
            Accept: "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
          },
        }
      );
      return res.status === 200;
    }

    async function refreshSha() {
      if (!getActiveToken()) return;
      const url = getContentsApiUrl() + "?ref=" + encodeURIComponent(GITHUB_CONFIG.branch);
      const res = await fetch(url, { headers: githubHeaders() });
      if (res.ok) {
        const file = await res.json();
        githubSha = file.sha;
      } else {
        githubSha = null;
      }
    }

    async function saveToGitHub(message) {
      if (isSyncing) return;
      if (!getActiveToken()) {
        throw new Error("尚未設定 GitHub Token，無法儲存。請按頂部「設定 Token」");
      }
      if (!githubSha) await refreshSha();

      isSyncing = true;
      setSyncStatus("同步中…", "info");

      const payload = {
        message: message || "更新童軍點名資料",
        content: encodeBase64Utf8(JSON.stringify(cache, null, 2)),
        branch: GITHUB_CONFIG.branch,
      };
      if (githubSha) payload.sha = githubSha;

      try {
        const res = await fetch(getContentsApiUrl(), {
          method: "PUT",
          headers: Object.assign({ "Content-Type": "application/json" }, githubHeaders()),
          body: JSON.stringify(payload),
        });

        if (res.status === 409) {
          await fetchFromGitHub();
          if (currentSectionId) renderTable();
          else if (isPaymentView) renderPaymentList();
          else renderHome();
          throw new Error("資料已被其他人更新，已重新載入最新版本，請再試一次");
        }

        if (!res.ok) {
          const err = await res.json().catch(function () { return {}; });
          if (res.status === 401) {
            localStorage.removeItem(TOKEN_STORAGE_KEY);
            if (GITHUB_CONFIG.defaultToken) {
              throw new Error("GitHub Token 已失效，請聯絡管理員更新部署設定");
            }
            throw new Error("GitHub Token 已失效，請重新按「設定 Token」輸入");
          }
          throw new Error(err.message || "無法寫入 GitHub（" + res.status + "）");
        }

        const result = await res.json();
        githubSha = result.content.sha;
        setSyncStatus("已同步至 GitHub", "success");
      } catch (err) {
        setSyncStatus("同步失敗", "error");
        throw err;
      } finally {
        isSyncing = false;
      }
    }

    async function persistAll(message) {
      await saveToGitHub(message);
    }

    function loadHistory() {
      return cache.history;
    }

    async function pushHistoryRecord(record) {
      cache.history.push(record);
      await persistAll("新增出席率計算紀錄");
      return cache.history;
    }

    function loadData() {
      return cache.attendance;
    }

    async function saveData(data) {
      cache.attendance = data;
      await persistAll("更新點名資料");
    }

    function getSectionData(sectionId) {
      const data = loadData();
      if (!data[sectionId]) {
        data[sectionId] = { members: [], dates: [], attendance: {} };
      }
      return data[sectionId];
    }

    async function updateSectionData(sectionId, sectionData) {
      const data = loadData();
      data[sectionId] = sectionData;
      await saveData(data);
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      if (isNaN(d.getTime())) return dateStr;
      const month = d.getMonth() + 1;
      const day = d.getDate();
      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
      return month + "/" + day + " (" + weekdays[d.getDay()] + ")";
    }

    function getDisplayDates(dates) {
      return dates.slice().sort(function (a, b) { return b.localeCompare(a); });
    }

    const ATTENDANCE = { PRESENT: "present", ABSENT: "absent", NA: "na" };

    function normalizeStatus(value) {
      if (value === true || value === "present") return ATTENDANCE.PRESENT;
      if (value === "na" || value === "not_joined") return ATTENDANCE.NA;
      return ATTENDANCE.ABSENT;
    }

    function nextStatus(value) {
      const status = normalizeStatus(value);
      if (status === ATTENDANCE.ABSENT) return ATTENDANCE.PRESENT;
      if (status === ATTENDANCE.PRESENT) return ATTENDANCE.NA;
      return ATTENDANCE.ABSENT;
    }

    function getStatusDisplay(value) {
      const status = normalizeStatus(value);
      if (status === ATTENDANCE.PRESENT) {
        return { text: "出席", icon: "fa-check", classes: "bg-green-100 text-green-700 hover:bg-green-200" };
      }
      if (status === ATTENDANCE.NA) {
        return { text: "未加入", icon: "fa-ban", classes: "bg-gray-100 text-gray-500 hover:bg-gray-200" };
      }
      return { text: "缺席", icon: "fa-xmark", classes: "bg-red-50 text-red-400 hover:bg-red-100 hover:text-red-600" };
    }

    function statusLabelForExport(value) {
      return getStatusDisplay(value).text;
    }

    function getAttendanceLevel(rate) {
      if (rate >= 80) return { text: "高", className: "text-green-600" };
      if (rate >= 50) return { text: "中", className: "text-yellow-600" };
      return { text: "低", className: "text-red-600" };
    }

    function calcMemberRate(section, member) {
      let attended = 0;
      let total = 0;
      section.dates.forEach(function (date) {
        const status = normalizeStatus(section.attendance[member] && section.attendance[member][date]);
        if (status === ATTENDANCE.NA) return;
        total += 1;
        if (status === ATTENDANCE.PRESENT) attended += 1;
      });
      const rate = total === 0 ? 0 : (attended / total) * 100;
      return { attended, total, rate, level: getAttendanceLevel(rate) };
    }

    function buildCalculationSnapshot(sectionId) {
      const sectionMeta = SECTIONS.find(function (s) { return s.id === sectionId; });
      const section = getSectionData(sectionId);
      const results = section.members.map(function (member) {
        const stats = calcMemberRate(section, member);
        return {
          name: member,
          attended: stats.attended,
          total: stats.total,
          rate: Number(stats.rate.toFixed(1)),
          level: stats.level.text,
        };
      });
      return {
        id: Date.now(),
        calculatedAt: new Date().toISOString(),
        sectionId: sectionId,
        sectionName: sectionMeta ? sectionMeta.name : sectionId,
        results: results,
      };
    }

    function readReceiptFile(file) {
      return new Promise(function (resolve, reject) {
        if (!file || !file.type.startsWith("image/")) {
          reject(new Error("請上傳圖片格式的收據截圖。"));
          return;
        }
        if (file.size > 5 * 1024 * 1024) {
          reject(new Error("圖片過大，請上傳 5MB 以下的收據。"));
          return;
        }
        const reader = new FileReader();
        reader.onload = function () {
          const img = new Image();
          img.onload = function () {
            const maxW = 1200;
            let w = img.width;
            let h = img.height;
            if (w > maxW) {
              h = Math.round(h * maxW / w);
              w = maxW;
            }
            const canvas = document.createElement("canvas");
            canvas.width = w;
            canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            let quality = 0.75;
            let dataUrl = canvas.toDataURL("image/jpeg", quality);
            while (dataUrl.length > 700000 && quality > 0.3) {
              quality -= 0.1;
              dataUrl = canvas.toDataURL("image/jpeg", quality);
            }
            if (dataUrl.length > 900000) {
              reject(new Error("收據圖片壓縮後仍過大，請改用較小的圖片。"));
              return;
            }
            resolve(dataUrl);
          };
          img.onerror = function () { reject(new Error("無法讀取圖片。")); };
          img.src = reader.result;
        };
        reader.onerror = function () { reject(new Error("無法讀取檔案。")); };
        reader.readAsDataURL(file);
      });
    }

      tableHead.innerHTML = headHtml;

      if (section.members.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="' + (section.dates.length + 4) + '" class="border border-gray-300 px-4 py-8 text-center text-gray-400"><i class="fa-solid fa-user-plus mr-1"></i>請先新增成員姓名</td></tr>';
        bindHeaderEvents();

        bindHeaderEvents();
        return;

      let bodyHtml = "";
      section.members.forEach(function (member) {
        if (!section.attendance[member]) section.attendance[member] = {};
        bodyHtml += '<tr class="hover:bg-blue-50/40 transition">';
        bodyHtml += '<td class="sticky left-0 z-10 bg-white border border-gray-300 px-4 py-2 font-medium text-gray-800 whitespace-nowrap"><i class="fa-solid fa-user text-gray-400 mr-1.5"></i>' + member + "</td>";

        displayDates.forEach(function (date) {
          const raw = section.attendance[member][date];
          const display = getStatusDisplay(raw);
          bodyHtml +=
            '<td class="border border-gray-300 p-0 text-center">' +
              '<button type="button" data-member="' + encodeURIComponent(member) + '" data-date="' + date + '" ' +

        const rate = stats.rate;

        bodyHtml += '<td class="border border-gray-300 px-2 py-2 text-center bg-gray-50"><button type="button" data-remove-member="' + encodeURIComponent(member) + '" class="text-xs text-red-500 hover:text-red-700 px-2 py-1 rounded hover:bg-red-50 transition"><i class="fa-solid fa-trash-can mr-0.5"></i>刪除</button></td></tr>';

      tableBody.innerHTML = bodyHtml;
      bindTableEvents();
      bindHeaderEvents();
      renderHistory();

    function bindTableEvents() {
      document.querySelectorAll(".attendance-cell").forEach(function (cell) {
        cell.addEventListener("click", async function () {
          try {
            const member = decodeURIComponent(cell.dataset.member);
            const date = cell.dataset.date;
            const section = getSectionData(currentSectionId);
            if (!section.attendance[member]) section.attendance[member] = {};
            const current = section.attendance[member][date];
            section.attendance[member][date] = nextStatus(current);
            await updateSectionData(currentSectionId, section);
            renderTable();
          } catch (err) {
            showError(err.message);
          }
        });
      });

      document.querySelectorAll("[data-remove-member]").forEach(function (btn) {
        btn.addEventListener("click", async function () {
          const member = decodeURIComponent(btn.dataset.removeMember);
          if (!confirm("確定要刪除「" + member + "」嗎？")) return;
          try {
            const section = getSectionData(currentSectionId);
            section.members = section.members.filter(function (m) { return m !== member; });
            delete section.attendance[member];
            await updateSectionData(currentSectionId, section);
            renderTable();
          } catch (err) {
            showError(err.message);
          }
        });
      });
    }

    function bindHeaderEvents() {
      document.querySelectorAll("[data-remove-date]").forEach(function (btn) {
        btn.addEventListener("click", async function (e) {
          e.stopPropagation();
          const date = btn.dataset.removeDate;
          if (!confirm("確定要刪除 " + formatDate(date) + " 這次集會嗎？")) return;
          try {
            const section = getSectionData(currentSectionId);
            section.dates = section.dates.filter(function (d) { return d !== date; });
            section.members.forEach(function (member) {
              if (section.attendance[member]) delete section.attendance[member][date];
            });
            await updateSectionData(currentSectionId, section);
            renderTable();
          } catch (err) {
            showError(err.message);
          }
        });
      });
    }

    function exportAllToExcel() {
      if (typeof XLSX === "undefined") {
        alert("Excel 匯出套件載入失敗，請重新整理頁面後再試。");
        return;
      }

      const data = loadData();
      const wb = XLSX.utils.book_new();
      let hasSheet = false;

      SECTIONS.forEach(function (sectionMeta) {
        const section = data[sectionMeta.id] || { members: [], dates: [], attendance: {} };
        if (section.members.length === 0 && section.dates.length === 0) return;

        const header = ["姓名"].concat(getDisplayDates(section.dates).map(formatDate)).concat(["出席率", "評估"]);
        const rows = [header];

        section.members.forEach(function (member) {
          const row = [member];
          getDisplayDates(section.dates).forEach(function (date) {
            const raw = section.attendance[member] && section.attendance[member][date];
            row.push(statusLabelForExport(raw));
          });
          const stats = calcMemberRate(section, member);
          row.push(stats.rate.toFixed(1) + "%", stats.level.text);
          rows.push(row);
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, sectionMeta.name.slice(0, 31));
        hasSheet = true;
      });

      const history = loadHistory();
      if (history.length > 0) {
        const histRows = [["時間", "支部", "姓名", "出席次數", "總集會次數", "出席率", "評估"]];
        history.forEach(function (item) {
          const timeStr = new Date(item.calculatedAt).toLocaleString("zh-Hant");
          (item.results || []).forEach(function (r) {
            histRows.push([timeStr, item.sectionName, r.name, r.attended, r.total, r.rate + "%", r.level]);
          });
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(histRows), "計算紀錄");
        hasSheet = true;
      }

      if (!hasSheet) {
        alert("目前沒有任何紀錄可匯出。");
        return;
      }

      const filename = "童軍集會點名_" + new Date().toISOString().slice(0, 10) + ".xlsx";
      XLSX.writeFile(wb, filename);
      setSyncStatus("已匯出 Excel", "success");
    }

    tokenBtn.addEventListener("click", async function () {
      if (GITHUB_CONFIG.defaultToken) {
        alert("此網站已由管理員設定 Token，無需手動輸入。\n若仍有問題，請清除瀏覽器快取後重新整理（Ctrl+Shift+R）。");
        return;
      }
      const input = prompt(
        "請輸入 GitHub Personal Access Token\n" +
        "建立方式：GitHub → Settings → Developer settings → Tokens (classic) → 勾選 repo\n" +
        "留空並確定可清除已儲存的 Token"
      );
      if (input === null) return;
      const token = input.trim();
      if (token === "") {
        localStorage.removeItem(TOKEN_STORAGE_KEY);
        setSyncStatus("已清除 Token", "info");
        return;
      }

      setSyncStatus("驗證 Token 中…", "info");
      const valid = await testToken(token);
      if (!valid) {
        setSyncStatus("Token 無效", "error");
        alert("GitHub Token 無效或已過期。\n請確認 Token 有 repo 權限，並重新建立後再試。");
        return;
      }

      localStorage.setItem(TOKEN_STORAGE_KEY, token);
      githubSha = null;
      await refreshSha();
      setSyncStatus("Token 已驗證並儲存", "success");
    });

        hideError();
        setSyncStatus("重新載入中…", "info");
        await fetchFromGitHub();
        if (currentSectionId) renderTable();
        else showCurrentViewAfterReload();
        setSyncStatus("已載入最新資料" + syncStatusSummary(), "success");
      } catch (err) {
        setSyncStatus("載入失敗", "error");
        if (currentSectionId) showError(err.message);
      }
    });

    addMemberBtn.addEventListener("click", async function () {
      hideError();
      const name = newMemberInput.value.trim();
      if (!name) { showError("請輸入姓名。"); return; }
      const section = getSectionData(currentSectionId);
      if (section.members.includes(name)) { showError("「" + name + "」已登記。"); return; }
      try {
        section.members.push(name);
        section.attendance[name] = {};
        await updateSectionData(currentSectionId, section);
        newMemberInput.value = "";
        renderTable();
      } catch (err) { showError(err.message); }
    });

    newMemberInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") addMemberBtn.click();
    });

    addDateBtn.addEventListener("click", async function () {
      hideError();
      const date = newDateInput.value;
      if (!date) { showError("請選擇集會日期。"); return; }
      const section = getSectionData(currentSectionId);
      if (section.dates.includes(date)) { showError("此日期已存在。"); return; }
      try {
        section.dates.push(date);
        section.dates.sort(function (a, b) { return b.localeCompare(a); });
        section.members.forEach(function (member) {
          if (!section.attendance[member]) section.attendance[member] = {};
          if (section.attendance[member][date] === undefined) section.attendance[member][date] = ATTENDANCE.ABSENT;
        });
        await updateSectionData(currentSectionId, section);
        renderTable();
      } catch (err) { showError(err.message); }
    });

    calcSaveBtn.addEventListener("click", async function () {
      hideError();
      calcSuccess.classList.add("hidden");
      const section = getSectionData(currentSectionId);
      if (section.members.length === 0) { showError("請先新增成員。"); return; }
      if (section.dates.length === 0) { showError("請先新增集會日期。"); return; }
      try {
        const record = buildCalculationSnapshot(currentSectionId);
        await pushHistoryRecord(record);
        calcSuccessText.textContent = "已計算並儲存至 GitHub（共 " + record.results.length + " 筆）";
        calcSuccess.classList.remove("hidden");
        renderHistory();
      } catch (err) { showError(err.message); }
    });

    backBtn.addEventListener("click", closeSection);
    paymentBackBtn.addEventListener("click", closePaymentView);

    paymentReceipt.addEventListener("change", async function () {
      hidePaymentError();
      const file = paymentReceipt.files[0];
      if (!file) {
        pendingReceiptDataUrl = null;
        paymentReceiptPreview.classList.add("hidden");
        paymentReceiptImg.src = "";
        return;
      }
      try {
        pendingReceiptDataUrl = await readReceiptFile(file);
        paymentReceiptImg.src = pendingReceiptDataUrl;
        paymentReceiptPreview.classList.remove("hidden");
      } catch (err) {
        pendingReceiptDataUrl = null;
        paymentReceipt.value = "";
        paymentReceiptPreview.classList.add("hidden");
        showPaymentError(err.message);
      }
    });

    paymentForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      hidePaymentError();
      hidePaymentSuccess();

      const applicantName = paymentApplicant.value.trim();
      const sectionId = paymentSection.value;
      const purpose = paymentPurpose.value.trim();
      const amount = parseFloat(paymentAmount.value);

      if (!applicantName) { showPaymentError("請輸入申請人姓名。"); return; }
      if (!sectionId) { showPaymentError("請選擇支部。"); return; }
      if (!purpose) { showPaymentError("請輸入款項用途。"); return; }
      if (!amount || amount <= 0) { showPaymentError("請輸入有效金額。"); return; }
      if (!pendingReceiptDataUrl) { showPaymentError("請上傳收據截圖。"); return; }

      const sectionMeta = PAYMENT_SECTIONS.find(function (s) { return s.id === sectionId; });
      paymentSubmitBtn.textContent = "提交中…";

      try {
        await pushPaymentRequest({
          id: Date.now(),
          submittedAt: new Date().toISOString(),
          applicantName: applicantName,
          sectionId: sectionId,
          sectionName: sectionMeta ? sectionMeta.name : sectionId,
          purpose: purpose,
          amount: amount,
          receiptImage: pendingReceiptDataUrl,
        });
        resetPaymentForm();
        renderPaymentList();
        showPaymentSuccess("申請已提交並同步至 GitHub。");
      } catch (err) {
        showPaymentError(err.message);
      } finally {
        paymentSubmitBtn.disabled = false;
        paymentSubmitBtn.innerHTML = '<i class="fa-solid fa-paper-plane mr-1"></i>提交申請';
      }
    });

    initApp();
  </script>
</body>
</html>
